name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (critical checks)
        run: ruff check app tests --select E9,F63,F7,F82

      - name: Run tests
        run: python -m pytest

  docker-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Run migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/v1/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed health check"
          docker compose logs api
          exit 1

      - name: Smoke simulation endpoint
        run: |
          curl -fsS -X POST "http://localhost:8000/api/v1/simulations/brute-force?count=20"
          curl -fsS "http://localhost:8000/api/v1/simulations/summary?limit=3"

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs api
          docker compose logs worker
          docker compose logs db
          docker compose logs redis

      - name: Tear down stack
        if: always()
        run: docker compose down -v
